name: AI Repository Index Validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-ai-repository-index:
    name: Validate AI Repository Index
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate AI Repository Index
        run: python scripts/generate_ai_repository_index.py --validate

      - name: Check generated index is up to date
        run: |
          python scripts/generate_ai_repository_index.py --write
          git diff --exit-code -- docs/ai_repository_index.md
